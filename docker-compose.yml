services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: rd_workflow
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - rd_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/rd_workflow
    depends_on:
      - db
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  rd_postgres_data:

